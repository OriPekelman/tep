name: build-matrix

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Sibling to ci.yml (which runs the full suite on ubuntu-x64). This matrix
# proves tep's *build path* — Spinel + the C helpers (sphttp/sqlite/pg) + a
# compiled example — works across x64 + arm64 / Linux + macOS. We ship tep as a
# gem and compile on the target (Spinel uses the host cc, no cross-compile), so
# there are no per-platform binaries to publish; this just keeps the
# build-from-source path honest on every platform a user might be on.
jobs:
  build:
    name: build + compile example (${{ matrix.os }})
    runs-on: ${{ matrix.runs_on }}
    # The arm leg runs on gx10, our self-hosted aarch64-Linux box (#183),
    # restoring a STRICT arm gate. The GitHub-hosted ubuntu-24.04-arm
    # runner was unreliable (reclaimed/cancelled mid-job during the
    # spinel-from-source build) so it's retired here. All three legs are
    # required now -- no continue-on-error.
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            runs_on: ubuntu-latest
          - os: gx10-arm64
            runs_on: [self-hosted, gx10, ARM64]
          - os: macos-14
            runs_on: macos-14
    env:
      TEP_SKIP_SPINEL_FRESH: "1"   # we provide a fresh spinel below
    steps:
      - uses: actions/checkout@v5

      - name: Build deps (C-ext headers — sqlite / libpq / openssl)
        # gx10 (self-hosted) already has the headers and the tmux runner
        # has no passwordless sudo; skip apt there. Hosted legs install.
        if: matrix.os != 'gx10-arm64'
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            # NB: do NOT add libssl-dev -- OpenSSL headers ship on the
            # GitHub Ubuntu images already (sphttp.c compiled fine before
            # this fix), and pulling libssl-dev upgrades the *running*
            # libssl3/openssl, which on the ubuntu-24.04-arm runner
            # SIGTERMs the job mid-apt (exit 143). libpq-dev is the only
            # genuinely-missing header.
            sudo apt-get update
            sudo apt-get install -y build-essential libsqlite3-dev libpq-dev
          elif [ "$RUNNER_OS" = "macOS" ]; then
            # macOS ships libsqlite3 in the SDK; OpenSSL + libpq live
            # under Homebrew off the default include/lib path. cc/clang
            # honor CPATH (find openssl/ssl.h + libpq-fe.h at compile)
            # and LIBRARY_PATH (find -lssl/-lcrypto/-lpq at link) without
            # any source-side cflags. PKG_CONFIG_PATH additionally feeds
            # the Makefile's `pkg-config libpq` (TEP_PG_CFLAGS).
            brew install pkg-config openssl@3 libpq
            SSL="$(brew --prefix openssl@3)"; PQ="$(brew --prefix libpq)"
            echo "CPATH=$SSL/include:$PQ/include"               >> "$GITHUB_ENV"
            echo "LIBRARY_PATH=$SSL/lib:$PQ/lib"                 >> "$GITHUB_ENV"
            echo "PKG_CONFIG_PATH=$SSL/lib/pkgconfig:$PQ/lib/pkgconfig" >> "$GITHUB_ENV"
          fi

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true

      - name: Build Spinel from master
        run: |
          git clone --depth 1 https://github.com/matz/spinel.git spinel-src
          make -C spinel-src deps
          make -C spinel-src all
          echo "TEP_SPINEL_DIR=$PWD/spinel-src" >> "$GITHUB_ENV"
          echo "SPINEL=$PWD/spinel-src/spinel"  >> "$GITHUB_ENV"

      - name: make helper (compile the C extensions — sphttp / sqlite / pg)
        run: make helper

      - name: Compile an example app (Spinel -> native binary)
        run: |
          "$SPINEL" --version >/dev/null 2>&1 || true
          bin/tep build examples/hello.rb -o hello_bin
          test -x hello_bin

      - name: Run the compiled binary (start, probe, stop)
        if: runner.os == 'Linux'
        run: |
          ./hello_bin -p 4567 &
          pid=$!
          ok=0
          for i in $(seq 1 30); do
            if curl -fsS "http://127.0.0.1:4567/" >/dev/null; then ok=1; break; fi
            sleep 0.5
          done
          kill "$pid" 2>/dev/null || true
          test "$ok" = "1"   # fail if the compiled server never answered
