name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # Build spinel at tep's SPINEL_PIN (the commit tep is verified against)
  # and publish the toolchain as an artifact. We used to track tip-of-
  # master to surface upstream breakage early, but that makes CI red on
  # any master regression (e.g. a full-lib/tep codegen regression) even
  # though tep is green at its pin -- so CI now builds the pinned spinel,
  # the single source of truth being the SPINEL_PIN file. (A separate
  # non-blocking "spinel master canary" job can restore the early-warning
  # without gating the suite.)
  #
  # The unified bin/spinel resolves its runtime (lib/) and the bundled
  # stdlib packages/ relative to its own directory, so the staged tree
  # ships as a unit.
  build-spinel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5            # tep -- for SPINEL_PIN
      - name: Clone + checkout pinned spinel
        run: |
          pin="$(head -1 SPINEL_PIN | tr -d '[:space:]')"
          echo "pinning spinel to $pin"
          git clone https://github.com/matz/spinel.git spinel-src
          git -C spinel-src checkout "$pin"
      - name: make deps (fetch vendored libprism)
        run: make -C spinel-src deps
      - name: make all
        run: make -C spinel-src all
      - name: Stage artifact tree
        # Unified layout (post spinelc->spinel refactor): one binary at
        # bin/spinel resolving its runtime at bin/../lib, plus the
        # bundled stdlib packages/ beside it. No root wrapper is staged
        # (artifacts don't preserve symlinks); consumers put
        # spinel-dist/bin on PATH.
        run: |
          mkdir -p spinel-dist/bin
          cp spinel-src/bin/spinel spinel-dist/bin/
          cp -R spinel-src/lib      spinel-dist/lib
          cp -R spinel-src/packages spinel-dist/packages
      - name: Upload spinel toolchain
        uses: actions/upload-artifact@v7
        with:
          name: spinel-dist
          path: spinel-dist
          retention-days: 1

  # Build tep's examples/bench + run the full test suite against the
  # spinel toolchain produced above. TEP_SKIP_SPINEL_FRESH=1 disables
  # tools/spinel-fresh.sh -- the artifact is already fresh, and the
  # script would otherwise try to locate a local spinel checkout.
  test:
    needs: build-spinel
    runs-on: ubuntu-latest
    env:
      TEP_SKIP_SPINEL_FRESH: "1"
    steps:
      - uses: actions/checkout@v5
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y build-essential libsqlite3-dev
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true   # installs Gemfile (rake / minitest / rbs)
      - uses: actions/download-artifact@v7
        with:
          name: spinel-dist
          path: spinel-dist
      - name: Restore exec bits and put spinel on PATH
        run: |
          chmod +x spinel-dist/bin/spinel
          echo "$GITHUB_WORKSPACE/spinel-dist/bin" >> "$GITHUB_PATH"
      - name: make all
        run: make all
      - name: rake rbs:validate
        run: bundle exec rake rbs:validate
      - name: rake test
        run: bundle exec rake test

  # Differential oracle: real sinatra vs tep (mirror condition 2,
  # docs/mirrors/sinatra.md). Boots each fixture app under CRuby+sinatra
  # and as a tep binary, replays the same requests, diffs the responses.
  # Deliberately its own job with its own Gemfile so the sinatra gem
  # never becomes a dependency of tep or of the main test job.
  differential:
    needs: build-spinel
    runs-on: ubuntu-latest
    env:
      TEP_SKIP_SPINEL_FRESH: "1"
      BUNDLE_GEMFILE: test/differential/Gemfile
    steps:
      - uses: actions/checkout@v5
      - name: Install build deps
        run: sudo apt-get update && sudo apt-get install -y build-essential libsqlite3-dev
      - name: Set up Ruby (+ sinatra oracle gems)
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0"
          bundler-cache: true   # installs test/differential/Gemfile
      - uses: actions/download-artifact@v7
        with:
          name: spinel-dist
          path: spinel-dist
      - name: Restore exec bits and put spinel on PATH
        run: |
          chmod +x spinel-dist/bin/spinel
          echo "$GITHUB_WORKSPACE/spinel-dist/bin" >> "$GITHUB_PATH"
      - name: Run differential oracle
        run: bundle exec ruby test/differential/runner.rb
